
{% extends "base.html" %}
{% block content %}
<form method="post">
<input name="name" placeholder="שם סדר">
<input name="start_time" placeholder="08:00">
<input name="amount" placeholder="סכום">
<input name="deduction" placeholder="קיזוז">
<input name="late_minutes" placeholder="דקות">
<button>שמור</button>
</form>

<table class="table">
<tr><th>שם</th><th>התחלה</th><th>סכום</th></tr>
{% for r in data %}
<tr><td>{{r.name}}</td><td>{{r.start_time}}</td><td>{{r.amount}}</td></tr>
{% endfor %}
</table>
{% endblock %}
