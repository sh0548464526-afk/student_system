
{% extends "base.html" %}
{% block content %}
<form method="post">
<input name="name" placeholder="שם">
<input name="tz" placeholder="תז">
<input name="s1" placeholder="08:05">
<input name="s2" placeholder="12:00">
<input name="s3" placeholder="18:00">
<button>שמור</button>
</form>

<table class="table">
<tr><th>שם</th><th>תז</th><th>ס1</th><th>ס2</th><th>ס3</th><th>סכום</th></tr>
{% for r in data %}
<tr>
<td>{{r.name}}</td>
<td>{{r.tz}}</td>
<td>{{r.s1}}</td>
<td>{{r.s2}}</td>
<td>{{r.s3}}</td>
<td>{{r.total}}</td>
</tr>
{% endfor %}
</table>
{% endblock %}
