
{% extends 'base.html' %}
{% block content %}
<h3>ימים</h3>
<form method=post>
<input name=name placeholder="שם יום">
<label><input type=checkbox name=active checked>פעיל</label>
<button class="btn btn-success">הוסף</button>
</form>
<table class="table">
{% for d in data %}
<tr><td>{{d.name}}</td><td>{{d.active}}</td></tr>
{% endfor %}
</table>
{% endblock %}
