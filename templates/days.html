
{% extends "base.html" %}
{% block content %}

<h3>ימים</h3>

<form method="post" class="mb-3">
<input class="form-control mb-2" name="day" placeholder="יום">
<label><input type="checkbox" name="marked"> מסומן</label>
<button class="btn btn-success">שמור</button>
</form>

<table class="table table-striped">
<tr><th>יום</th><th>סימון</th></tr>
{% for r in data %}
<tr><td>{{r.day}}</td><td>{{r.marked}}</td></tr>
{% endfor %}
</table>

{% endblock %}
