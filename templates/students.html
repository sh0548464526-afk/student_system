
{% extends "base.html" %}
{% block content %}
<form method="post">
<input name="name" placeholder="שם">
<input name="tz" placeholder="תז">
<button>שמור</button>
</form>

<table class="table">
<tr><th>שם</th><th>תז</th></tr>
{% for r in data %}
<tr><td>{{r.name}}</td><td>{{r.tz}}</td></tr>
{% endfor %}
</table>
{% endblock %}
