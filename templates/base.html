<script>
function searchTable(input,id,col){
let v=input.value.toLowerCase()
let rows=document.getElementById(id).rows
for(let i=1;i<rows.length;i++){
let t=rows[i].cells[col].innerText.toLowerCase()
rows[i].style.display=t.includes(v)?"":"none"
}}
</script>
</head>
